<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณร้อยละ</title>
    <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="logocalculator.png">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004d99;
            --secondary: #eef2f7;
            --success: #28a745;
            --danger: #dc3545;
            --gray: #6c757d;
            --gold: #d4af37;
        }
        body { font-family: 'Sarabun', sans-serif; background-color: #f5f7fa; margin: 0; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* Logo Section */
        .header { text-align: center; padding: 20px 15px 10px; }
        .header img { max-width: 100px; margin-bottom: 10px; border-radius: 10px; }
        
        .tabs { display: flex; background: #f1f1f1; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px 5px; border: none; background: none; cursor: pointer; font-family: inherit; font-weight: bold; color: #666; transition: 0.3s; font-size: 0.85rem; }
        .tab-btn.active { background: white; color: var(--primary); border-bottom: 3px solid var(--primary); }
        .tab-content { padding: 20px; display: none; }
        .tab-content.active { display: block; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #333; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .result-card { margin-top: 15px; padding: 20px; background: var(--secondary); border-radius: 12px; text-align: center; border: 1px solid #d1d9e6; }
        .res-label { font-size: 0.85rem; color: #555; }
        .res-main { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin: 5px 0; }
        
        .btn-clear { width: 100%; margin-top: 15px; padding: 10px; background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; color: var(--gray); cursor: pointer; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .row { display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logocalculator.png" alt="Logo" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        <div style="font-weight: bold; color: var(--primary);">PERCENTRATE CALCULATOR</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'kpiTab')">KPI ตัวชี้วัด</button>
        <button class="tab-btn" onclick="openTab(event, 'budgetTab')">ร้อยละผลเบิกจ่าย</button>
        <button class="tab-btn" onclick="openTab(event, 'generalTab')">ร้อยละทั่วไป</button>
    </div>

    <div id="kpiTab" class="tab-content active">
        <div class="input-group">
            <label>ประเภทเกณฑ์การวัดผล</label>
            <select id="kpiType" onchange="calcKpi()">
                <option value="normal">📈 ไม่น้อยกว่า (ทางตรง - ยิ่งมากยิ่งดี)</option>
                <option value="inverse">📉 ไม่เกิน (ผกผัน - ยิ่งน้อยยิ่งดี)</option>
            </select>
        </div>
        <div class="input-group">
            <label>ค่าเป้าหมาย (แผน)</label>
            <input type="number" id="kpiPlan" placeholder="เช่น 100" oninput="calcKpi()">
        </div>
        <div class="input-group">
            <label>ผลการดำเนินงาน (ผล)</label>
            <input type="number" id="kpiResult" placeholder="เช่น 80" oninput="calcKpi()">
        </div>
        <div class="result-card">
            <div class="res-label">คะแนนผลสัมฤทธิ์ (ร้อยละ)</div>
            <div id="kpiDisplay" class="res-main">0.00</div>
            <div id="kpiStatus" style="font-size: 1rem; font-weight: bold;"></div>
        </div>
        <button class="btn-clear" onclick="clearKpi()">🧹 ล้างข้อมูล</button>
    </div>

    <div id="budgetTab" class="tab-content">
        <div class="row">
            <div class="input-group" style="flex:1">
                <label>จำนวนวันทั้งหมด</label>
                <input type="number" id="bgDays" value="90" oninput="calcBg()">
            </div>
            <div class="input-group" style="flex:1">
                <label>จำนวนวัน ณ วันที่คำนวณ</label>
                <input type="number" id="bgCurrent" placeholder="75" oninput="calcBg()">
            </div>
        </div>
        <div class="input-group">
            <label>เป้าหมายปลายทาง (%)</label>
            <input type="number" id="bgTarget" placeholder="25" oninput="calcBg()">
        </div>
        <hr>
        <div class="input-group"><label>งบประมาณทั้งหมด</label><input type="number" id="bgTotal" oninput="calcBg()"></div>
        <div class="input-group"><label>เบิกจ่ายจริง</label><input type="number" id="bgActual" oninput="calcBg()"></div>
        
        <div class="result-card">
            <div class="res-label">แผนที่ควรทำได้: <span id="bgPlanPct" style="font-weight:bold">0.00%</span></div>
            <div class="res-label">เบิกจ่ายจริง:</div>
            <div id="bgActualPct" class="res-main">0.00</div>
            <div id="bgStatus" style="font-size: 1rem;"></div>
        </div>
        <button class="btn-clear" onclick="clearBg()">🧹 ล้างข้อมูล</button>
    </div>

    <div id="generalTab" class="tab-content">
        <div class="input-group">
            <label>1. หาค่าร้อยละของจำนวน</label>
            <div class="row">
                <input type="number" id="g1_p" placeholder="กี่ %" oninput="calcG1()">
                <span>ของ</span>
                <input type="number" id="g1_v" placeholder="จำนวน" oninput="calcG1()">
            </div>
            <div id="g1_res" style="margin-top:8px; color:var(--primary); font-weight:bold;">คำตอบ: -</div>
        </div>
        <hr>
        <div class="input-group">
            <label>2. จำนวนนี้คิดเป็นกี่ % ของทั้งหมด</label>
            <div class="row">
                <input type="number" id="g2_v" placeholder="จำนวน" oninput="calcG2()">
                <span>จาก</span>
                <input type="number" id="g2_t" placeholder="ทั้งหมด" oninput="calcG2()">
            </div>
            <div id="g2_res" style="margin-top:8px; color:var(--primary); font-weight:bold;">คำตอบ: - %</div>
        </div>
        <hr>
        <div class="input-group">
            <label>3. หา % ที่เพิ่มขึ้นหรือลดลง</label>
            <div class="row">
                <input type="number" id="g3_o" placeholder="เก่า" oninput="calcG3()">
                <span>ไป</span>
                <input type="number" id="g3_n" placeholder="ใหม่" oninput="calcG3()">
            </div>
            <div id="g3_res" style="margin-top:8px; color:var(--primary); font-weight:bold;">คำตอบ: -</div>
        </div>
    </div>
</div>

<script>
    function openTab(evt, tabName) {
        let i, content, links;
        content = document.getElementsByClassName("tab-content");
        for (i = 0; i < content.length; i++) { content[i].style.display = "none"; }
        links = document.getElementsByClassName("tab-btn");
        for (i = 0; i < links.length; i++) { links[i].className = links[i].className.replace(" active", ""); }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    // แก้ไขสูตร KPI ตามตรรกะผกผันทุกกรณี
    function calcKpi() {
        const type = document.getElementById('kpiType').value;
        const plan = parseFloat(document.getElementById('kpiPlan').value);
        const result = parseFloat(document.getElementById('kpiResult').value);
        const disp = document.getElementById('kpiDisplay');
        const status = document.getElementById('kpiStatus');

        if (!plan || isNaN(result)) { disp.innerText = "0.00"; status.innerText = ""; return; }

        let score;
        if (type === 'normal') {
            // ยิ่งมากยิ่งดี
            score = (result / plan) * 100;
        } else {
            // ยิ่งน้อยยิ่งดี (ผกผันทุกกรณี)
            score = 200 - ((result / plan) * 100);
        }

        // ป้องกันคะแนนติดลบ
        score = Math.max(0, score);
        disp.innerText = score.toFixed(2);

        if (score >= 100) {
            disp.style.color = 'var(--success)';
            status.innerText = "✅ บรรลุเป้าหมาย";
            status.style.color = 'var(--success)';
        } else {
            disp.style.color = 'var(--danger)';
            status.innerText = "⚠️ ต่ำกว่าเป้าหมาย";
            status.style.color = 'var(--danger)';
        }
    }

    function clearKpi() {
        ['kpiPlan', 'kpiResult'].forEach(id => document.getElementById(id).value = '');
        calcKpi();
    }

    function calcBg() {
        const days = parseFloat(document.getElementById('bgDays').value) || 0;
        const cur = parseFloat(document.getElementById('bgCurrent').value) || 0;
        const tar = parseFloat(document.getElementById('bgTarget').value) || 0;
        const tot = parseFloat(document.getElementById('bgTotal').value) || 0;
        const act = parseFloat(document.getElementById('bgActual').value) || 0;

        let planToday = (days > 0) ? (cur / days) * tar : 0;
        document.getElementById('bgPlanPct').innerText = planToday.toFixed(2) + "%";

        let actPct = (tot > 0) ? (act / tot) * 100 : 0;
        document.getElementById('bgActualPct').innerText = actPct.toFixed(2);

        const status = document.getElementById('bgStatus');
        if (tot > 0 && days > 0) {
            let diff = actPct - planToday;
            status.innerHTML = diff >= 0 
                ? `<span style="color:var(--success)">เร็วกว่าแผน ${diff.toFixed(2)}%</span>`
                : `<span style="color:var(--danger)">ช้ากว่าแผน ${Math.abs(diff).toFixed(2)}%</span>`;
        }
    }

    function clearBg() {
        ['bgCurrent', 'bgTarget', 'bgTotal', 'bgActual'].forEach(id => document.getElementById(id).value = '');
        calcBg();
    }

    // ฟังก์ชันคำนวณร้อยละทั่วไป
    function calcG1() {
        const p = parseFloat(document.getElementById('g1_p').value);
        const v = parseFloat(document.getElementById('g1_v').value);
        if (!isNaN(p) && !isNaN(v)) document.getElementById('g1_res').innerText = "คำตอบ: " + (p * v / 100).toLocaleString();
    }
    function calcG2() {
        const v = parseFloat(document.getElementById('g2_v').value);
        const t = parseFloat(document.getElementById('g2_t').value);
        if (!isNaN(v) && t) document.getElementById('g2_res').innerText = "คำตอบ: " + (v / t * 100).toFixed(2) + " %";
    }
    function calcG3() {
        const o = parseFloat(document.getElementById('g3_o').value);
        const n = parseFloat(document.getElementById('g3_n').value);
        if (!isNaN(o) && !isNaN(n)) {
            let diff = ((n - o) / o) * 100;
            document.getElementById('g3_res').innerText = (diff >= 0 ? "เพิ่มขึ้น " : "ลดลง ") + Math.abs(diff).toFixed(2) + " %";
            document.getElementById('g3_res').style.color = diff >= 0 ? 'var(--success)' : 'var(--danger)';
        }
    }
</script>

</body>
</html>
